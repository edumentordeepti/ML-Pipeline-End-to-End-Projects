<!DOCTYPE html>
<html>
<head>
    <title>Auto MPG Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Auto Mileage Prediction</h1>

<div class="container">

    <input type="number" id="cylinders" placeholder="cylinders">
    <input type="number" id="displacement" placeholder="displacement">
    <input type="number" id="horsepower" placeholder="horsepower">
    <input type="number" id="weight" placeholder="weight">
    <input type="number" id="acceleration" placeholder="acceleration">
    <input type="number" id="origin" placeholder="origin">

    <button onclick="predict()">Predict MPG</button>

    <h2 id="result"></h2>
</div>

<script src="script.js"></script>

</body>
</html>
